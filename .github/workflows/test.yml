name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  pytest:
    name: pytest (${{ matrix.os }} / py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.12"]

    env:
      QT_QPA_PLATFORM: offscreen
      MPLBACKEND: Agg

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install Linux Qt/X11 runtime libraries
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 libgl1 libxkbcommon-x11-0 libdbus-1-3 \
            libxcb-cursor0 libxcb-icccm4 libxcb-image0 \
            libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 \
            libxcb-shape0 libxcb-sync1 libxcb-xfixes0 \
            libxcb-xinerama0 libxcb-xkb1 libxkbcommon0 \
            libfontconfig1

      - name: Install runtime and test dependencies
        # ``lunapi`` is only published for the lunascope release version on
        # some platforms; the test suite is Qt/numeric-only and does not
        # import it, so install everything else explicitly and then add the
        # package itself with --no-deps.
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            "PySide6>=6.10,<6.11" \
            "pyqtgraph>=0.13.7,<0.14" \
            "numpy>=2.0,<3" \
            "pandas>=2.2,<3" \
            "matplotlib>=3.8,<4" \
            "psutil>=5.9" \
            "pytest>=7" \
            "pytest-qt>=4.2" \
            "pytest-mock>=3.10" \
            "scipy>=1.10"
          python -m pip install -e . --no-deps

      - name: Run pytest
        run: |
          pytest -v --tb=short
